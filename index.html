<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Depth Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,600;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#ffffff;--bg2:#f5f5f5;--border:#e0e0e0;--border2:#cccccc;--text:#111111;--text2:#444444;--text3:#888888;--accent:#8B6914;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:500;min-height:100vh;-webkit-font-smoothing:antialiased;}
    .nav-wrap{border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
    .nav-top{padding:0 40px;height:52px;display:flex;align-items:center;justify-content:space-between;}
    .nav-logo{font-family:'Playfair Display',serif;font-weight:800;font-size:20px;color:var(--text);text-decoration:none;letter-spacing:-.01em;}
    .nav-logo span{color:var(--accent);}
    .nav-actions{display:flex;align-items:center;gap:24px;}
    .nav-actions a{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);text-decoration:none;}
    .nav-actions a:hover{color:var(--text);}
    .nav-signin{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bg);background:var(--text);border:none;padding:6px 16px;cursor:pointer;}
    .nav-sub{border-top:1px solid var(--border);padding:0 40px;height:36px;display:flex;align-items:center;}
    .nav-sub a{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-decoration:none;padding:0 16px;height:100%;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .15s;}
    .nav-sub a:first-child{padding-left:0;}
    .nav-sub a:hover,.nav-sub a.active{color:var(--text);border-bottom-color:var(--accent);}
    .nav-search{margin-left:auto;background:none;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:4px 8px;width:160px;outline:none;}
    .nav-search:focus{border-bottom-color:var(--accent);}
    .nav-search::placeholder{color:var(--text3);}
    .page-header{padding:48px 40px 36px;border-bottom:1px solid var(--border);}
    .page-header-eyebrow{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
    .page-header-eyebrow::before{content:'';width:20px;height:1px;background:var(--accent);}
    .page-header h1{font-family:'Playfair Display',serif;font-weight:800;font-size:48px;line-height:1;letter-spacing:-.02em;color:var(--text);margin-bottom:12px;}
    .page-header-meta{display:flex;align-items:center;gap:20px;font-size:12px;color:var(--text3);}
    .meta-dot{width:3px;height:3px;border-radius:50%;background:var(--border2);}
    .filter-bar{padding:12px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--bg2);}
    .filter-btn{font-size:11px;font-weight:700;letter-spacing:.04em;padding:4px 12px;border:1px solid var(--border2);background:var(--bg);color:var(--text3);cursor:pointer;transition:all .15s;}
    .filter-btn:hover,.filter-btn.active{color:var(--text);border-color:var(--accent);background:rgba(139,105,20,.06);}
    .filter-sep{width:1px;height:16px;background:var(--border);margin:0 4px;}
    .filter-select{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;background:var(--bg);border:1px solid var(--border2);color:var(--text2);padding:4px 8px;outline:none;cursor:pointer;}
    .filter-count{margin-left:auto;font-size:11px;font-weight:600;color:var(--text3);font-family:'Share Tech Mono',monospace;}
    .filter-count strong{color:var(--accent);}
    .table-section{padding:0 40px 64px;}
    .table-header{display:grid;grid-template-columns:48px 12px 1fr 80px 80px 80px 80px 80px;gap:0;padding:10px 0;border-bottom:2px solid var(--border2);margin-top:24px;}
    .th{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
    .th.center{text-align:center;}
    .team-row{display:grid;grid-template-columns:48px 12px 1fr 80px 80px 80px 80px 80px;gap:0;padding:14px 0;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .15s;}
    .team-row:hover{background:var(--bg2);}
    .tr-rank{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:var(--border2);text-align:center;}
    .team-row:hover .tr-rank{color:var(--text3);}
    .tr-color-bar{width:4px;height:100%;border-radius:2px;align-self:stretch;}
    .tr-team-name{font-family:'Playfair Display',serif;font-weight:800;font-size:17px;color:var(--text);letter-spacing:-.01em;margin-bottom:3px;}
    .tr-team-conf{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);}
    .tr-grade{text-align:center;}
    .grade-val{font-family:'Playfair Display',serif;font-weight:800;font-size:18px;line-height:1;}
    .grade-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-top:2px;}
    .gAp{color:#1a8c3a;}.gA{color:#1a8c3a;}.gAm{color:#2ea84f;}
    .gBp{color:#1a5fbf;}.gB{color:#1a5fbf;}.gBm{color:#2e74d4;}
    .gCp{color:#a06000;}.gC{color:#a06000;}.gCm{color:#b87000;}
    .gDp{color:#cc2200;}.gD{color:#cc2200;}.gDm{color:#dd3300;}.gF{color:#aa0000;}
    .grade-group-label{padding:20px 0 8px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .grade-group-label::after{content:'';flex:1;height:1px;background:var(--border);}
    .loading-state{text-align:center;padding:80px 40px;color:var(--text3);}
    .loading-spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .error-state{text-align:center;padding:80px 40px;}
    .error-state h3{font-family:'Playfair Display',serif;font-size:24px;color:var(--text);margin-bottom:8px;}
    .error-state p{font-size:13px;color:var(--text3);margin-top:6px;}
    footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;}
    .footer-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--text3);}
    .footer-logo span{color:var(--accent);}
    .footer-meta{font-size:11px;font-weight:600;color:var(--text3);}
    @media(max-width:900px){.nav-top,.nav-sub,.page-header,.filter-bar,.table-section{padding-left:20px;padding-right:20px;}.page-header h1{font-size:32px;}.table-header,.team-row{grid-template-columns:36px 8px 1fr 48px 48px 48px 48px 48px;}}
  </style>
</head>
<body>

<div class="nav-wrap">
  <div class="nav-top">
    <a class="nav-logo" href="index.html">The Depth <span>Chart</span></a>
    <div class="nav-actions">
      <a href="pricing.html">Pricing</a>
      <a href="login.html">Sign In</a>
      <button class="nav-signin">Subscribe</button>
    </div>
  </div>
  <div class="nav-sub">
    <a href="index.html" class="active">Rankings</a>
    <a href="team.html">Teams</a>
    <a href="pricing.html">Pricing</a>
    <input class="nav-search" id="searchInput" type="text" placeholder="Search teams…" oninput="applyFilters()"/>
  </div>
</div>

<div class="page-header">
  <div class="page-header-eyebrow">2025–26 Season · College Basketball</div>
  <h1>Roster Rankings</h1>
  <div class="page-header-meta">
    <span>ACC · Big Ten · Big 12 · Big East · SEC</span>
    <span class="meta-dot"></span>
    <span id="lastUpdated">Loading…</span>
    <span class="meta-dot"></span>
    <span id="teamCount">—</span>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setConf('',this)">All</button>
  <button class="filter-btn" onclick="setConf('ACC',this)">ACC</button>
  <button class="filter-btn" onclick="setConf('B10',this)">Big Ten</button>
  <button class="filter-btn" onclick="setConf('B12',this)">Big 12</button>
  <button class="filter-btn" onclick="setConf('BE',this)">Big East</button>
  <button class="filter-btn" onclick="setConf('SEC',this)">SEC</button>
  <div class="filter-sep"></div>
  <select class="filter-select" id="sortSel" onchange="applyFilters()">
    <option value="rank">Sort: Overall Rank</option>
    <option value="roster">Sort: Roster Grade</option>
    <option value="depth">Sort: Depth Grade</option>
    <option value="recruit">Sort: Recruit Grade</option>
    <option value="nil">Sort: NIL Eval</option>
    <option value="niltier">Sort: NIL Tier</option>
  </select>
  <div class="filter-count" id="filterCount"></div>
</div>

<div class="table-section">
  <div class="table-header">
    <div class="th">Rk</div>
    <div class="th"></div>
    <div class="th">Team</div>
    <div class="th center">Roster</div>
    <div class="th center">Depth</div>
    <div class="th center">Recruit</div>
    <div class="th center">NIL Eval</div>
    <div class="th center">NIL</div>
  </div>
  <div id="rankingsList">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div>Loading rankings…</div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">The Depth <span>Chart</span></div>
  <div class="footer-meta">College Basketball Roster Analysis · 2025–26</div>
</footer>

<script>
const SB_URL = 'https://izlqhnxowdhtdofkwrho.supabase.co';
const SB_KEY = 'sb_publishable_XQKr9A5ZP79pe0ac1RKYvA_-0dAx9Ye';
const HEADERS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

let allTeams = [];
let confFilter = '';

function nilRange(tier){
  const map={
    'Tier 1':'$20M+','Tier 2':'$16-20M','Tier 3':'$11-16M',
    'Tier 4':'$9-11M','Tier 5':'$6-9M','Tier 6':'$4-6M',
    'Tier 7':'$2-4M','Tier 8':'$500K-2M','Tier 9':'$0-500K'
  };
  return map[tier]||'';
}

function tierNum(tier){
  const m={'Tier 1':1,'Tier 2':2,'Tier 3':3,'Tier 4':4,'Tier 5':5,'Tier 6':6,'Tier 7':7,'Tier 8':8,'Tier 9':9};
  return m[tier]||99;
}

async function loadTeams(){
  try {
    const r = await fetch(
      `${SB_URL}/rest/v1/teams?select=*&order=tdc_rank.asc.nullslast,name.asc`,
      { headers: HEADERS }
    );
    if(!r.ok) throw new Error(`Supabase error ${r.status}`);
    const rows = await r.json();

    allTeams = rows.map(t => ({
      rk:     t.tdc_rank || 9999,
      name:   t.name,
      conf:   t.conference || '',
      record: t.record || '',
      rg:     t.roster_grade  || '—',
      dg:     t.depth_grade   || '—',
      recg:   t.recruit_grade || '—',
      nilg:   t.nil_grade  || '—',
      nilt:   t.nil_tier   || '—',
      color:  t.color || t.primary_color || '#666',
      updated: t.updated_at,
    }));

    const d = new Date(rows[0]?.updated_at || Date.now());
    document.getElementById('lastUpdated').textContent =
      'Updated ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    document.getElementById('teamCount').textContent = `${allTeams.length} teams ranked`;

    applyFilters();
  } catch(e) {
    document.getElementById('rankingsList').innerHTML = `
      <div class="error-state">
        <h3>Could not load rankings</h3>
        <p>Make sure your Supabase tables are populated.</p>
        <p>${e.message}</p>
      </div>`;
  }
}

function gc(g){
  return {"A+":"gAp","A":"gA","A-":"gAm","B+":"gBp","B":"gB","B-":"gBm","C+":"gCp","C":"gC","D":"gD"}[g]||"";
}
function gn(g){
  return {"A+":12,"A":11,"A-":10,"B+":9,"B":8,"B-":7,"C+":6,"C":5,"D":2}[g]||0;
}

function setConf(conf,btn){
  confFilter=conf;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters(){
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const srt    = document.getElementById('sortSel').value;

  let data = allTeams.filter(t=>{
    if(confFilter && t.conf!==confFilter) return false;
    if(search && !t.name.toLowerCase().includes(search)) return false;
    return true;
  });

  data.sort((a,b)=>{
    if(srt==='rank')    return a.rk-b.rk;
    if(srt==='roster')  return gn(b.rg)-gn(a.rg);
    if(srt==='depth')   return gn(b.dg)-gn(a.dg);
    if(srt==='recruit') return gn(b.recg)-gn(a.recg);
    if(srt==='nil')     return gn(b.nilg)-gn(a.nilg);
    if(srt==='niltier') return tierNum(a.nilt)-tierNum(b.nilt);
    return 0;
  });

  document.getElementById('filterCount').innerHTML =
    `<strong>${data.length}</strong> of ${allTeams.length} teams`;

  if(!data.length){
    document.getElementById('rankingsList').innerHTML =
      '<div style="padding:40px;text-align:center;color:var(--text3);">No teams found</div>';
    return;
  }

  const srt2 = document.getElementById('sortSel').value;
  let html='', lastGrade='';
  data.forEach(t=>{
    const grp = t.rg.startsWith('A')?'A-Tier':t.rg.startsWith('B')?'B-Tier':'C-Tier';
    if(srt2==='rank' && !confFilter && grp!==lastGrade){
      html+=`<div class="grade-group-label">${grp}</div>`;
      lastGrade=grp;
    }
    html+=`
    <div class="team-row" onclick="location='team.html?team=${encodeURIComponent(t.name)}'">
      <div class="tr-rank">${t.rk<9999?t.rk:'—'}</div>
      <div class="tr-color-bar" style="background:${t.color}"></div>
      <div>
        <div class="tr-team-name">${t.name}</div>
        <div class="tr-team-conf">${t.conf}</div>
      </div>
      <div class="tr-grade"><div class="grade-val ${gc(t.rg)}">${t.rg}</div><div class="grade-lbl">Roster</div></div>
      <div class="tr-grade"><div class="grade-val ${gc(t.dg)}">${t.dg}</div><div class="grade-lbl">Depth</div></div>
      <div class="tr-grade"><div class="grade-val ${gc(t.recg)}">${t.recg}</div><div class="grade-lbl">Recruit</div></div>
      <div class="tr-grade"><div class="grade-val ${gc(t.nilg)}">${t.nilg}</div><div class="grade-lbl">NIL Eval</div></div>
      <div class="tr-grade" style="text-align:center;"><div style="font-size:13px;font-weight:700;color:var(--text2);">${t.nilt}</div><div class="grade-lbl">${nilRange(t.nilt)}</div></div>
    </div>`;
  });
  document.getElementById('rankingsList').innerHTML=html;
}

loadTeams();
</script>
</body>
</html>
