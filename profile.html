<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — The Depth Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#fff;--bg2:#f5f5f5;--border:#e0e0e0;--border2:#ccc;--text:#111;--text2:#444;--text3:#888;--accent:#8B6914;--green:#1a8c3a;--red:#cc2200;}
    [data-theme="dark"]{--bg:#111;--bg2:#181818;--border:#2a2a2a;--border2:#333;--text:#e8e8e8;--text2:#a0a0a0;--text3:#606060;--accent:#c8a96e;}
    [data-theme="dark"] .nav-signin{background:var(--text)!important;color:var(--bg)!important;}
    [data-theme="dark"] .form-input,[data-theme="dark"] .form-textarea{background:var(--bg2);color:var(--text);}
    [data-theme="dark"] .profile-card{background:var(--bg2);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:500;min-height:100vh;}
    .nav-wrap{border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
    .nav-top{padding:0 40px;height:52px;display:flex;align-items:center;justify-content:space-between;min-width:0;}
    .nav-logo{font-family:'Playfair Display',serif;font-weight:800;font-size:20px;color:var(--text);text-decoration:none;white-space:nowrap;}
    .nav-logo span{color:var(--accent);}
    .nav-actions{display:flex;align-items:center;gap:14px;}
    .nav-actions a{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);text-decoration:none;}
    .nav-signin{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bg);background:var(--text);padding:6px 16px;text-decoration:none;}
    .theme-toggle{background:none;border:1px solid var(--border2);color:var(--text3);font-size:14px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .nav-sub{border-top:1px solid var(--border);padding:0 40px;height:36px;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;}
    .nav-sub::-webkit-scrollbar{display:none;}
    .nav-sub a{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-decoration:none;padding:0 14px;height:100%;display:flex;align-items:center;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
    .nav-sub a:first-child{padding-left:0;}
    .nav-sub a:hover,.nav-sub a.active{color:var(--text);border-bottom-color:var(--accent);}

    /* PROFILE BANNER */
    .profile-banner{height:180px;background:var(--bannerColor,#8B6914);background-size:cover;background-position:center;position:relative;cursor:pointer;}
    .profile-banner-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s;display:flex;align-items:center;justify-content:center;}
    .profile-banner.editable:hover .profile-banner-overlay{background:rgba(0,0,0,.35);}
    .profile-banner-edit-hint{color:#fff;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s;letter-spacing:.04em;text-transform:uppercase;}
    .profile-banner.editable:hover .profile-banner-edit-hint{opacity:1;}
    .profile-avatar-wrap{position:absolute;bottom:-54px;left:40px;}
    .profile-avatar{width:108px;height:108px;border-radius:50%;border:4px solid var(--bg);object-fit:cover;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:var(--accent);overflow:hidden;}
    .profile-avatar img{width:100%;height:100%;object-fit:cover;}
    .verified-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--accent);border-radius:50%;margin-left:6px;flex-shrink:0;vertical-align:middle;}
    .verified-badge svg{width:11px;height:11px;fill:#fff;}

    /* PROFILE INFO */
    .profile-info{max-width:900px;margin:0 auto;padding:0 40px;}
    .profile-info-top{padding-top:64px;padding-bottom:24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;}
    .profile-username{font-family:'Playfair Display',serif;font-weight:800;font-size:28px;margin-bottom:4px;}
    .profile-bio{font-size:14px;color:var(--text3);margin-top:6px;max-width:500px;}
    .profile-meta{display:flex;align-items:center;gap:16px;margin-top:10px;flex-wrap:wrap;}
    .profile-meta-item{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;}
    .profile-meta-item strong{color:var(--text2);}
    .edit-btn{padding:8px 20px;border:1px solid var(--border2);background:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;color:var(--text2);transition:all .15s;}
    .edit-btn:hover{border-color:var(--accent);color:var(--accent);}

    /* TABS */
    .profile-tabs{display:flex;border-bottom:1px solid var(--border);margin-top:0;}
    .profile-tab{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:12px 20px;border:none;background:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
    .profile-tab.active{color:var(--text);border-bottom-color:var(--accent);}

    /* EDIT FORM */
    .edit-section{padding:28px 0;}
    .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-group{margin-bottom:16px;}
    .form-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:6px;}
    .form-input{width:100%;padding:10px 14px;border:1px solid var(--border2);background:var(--bg);font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;}
    .form-input:focus{border-color:var(--accent);}
    .form-textarea{width:100%;padding:10px 14px;border:1px solid var(--border2);background:var(--bg);font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:80px;transition:border-color .15s;}
    .form-textarea:focus{border-color:var(--accent);}
    .form-select{width:100%;padding:10px 14px;border:1px solid var(--border2);background:var(--bg);font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;cursor:pointer;}
    .form-btn{padding:10px 24px;background:var(--text);color:var(--bg);border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
    .form-btn:hover{opacity:.85;}
    .avatar-upload-area{border:2px dashed var(--border2);padding:20px;text-align:center;cursor:pointer;transition:border-color .15s;}
    .avatar-upload-area:hover{border-color:var(--accent);}
    .avatar-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;border:2px solid var(--border2);}
    .msg{padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:12px;display:none;}
    .msg.success{background:rgba(26,140,58,.08);color:var(--green);border:1px solid rgba(26,140,58,.2);}
    .msg.error{background:rgba(204,34,0,.08);color:var(--red);border:1px solid rgba(204,34,0,.2);}
    .msg.show{display:block;}

    /* POSTS */
    .posts-section{padding:24px 0;}
    .post-item{border:1px solid var(--border);padding:16px 20px;margin-bottom:10px;cursor:pointer;}
    .post-item:hover{border-color:var(--border2);background:var(--bg2);}
    .post-title{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;margin-bottom:4px;}
    .post-meta{font-size:12px;color:var(--text3);}

    .color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
    .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
    .swatch.active,.swatch:hover{border-color:var(--text);}

    .loading-state{text-align:center;padding:60px;color:var(--text3);}
    .loading-spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;margin-top:40px;}
    .footer-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--text3);}
    .footer-logo span{color:var(--accent);}
    .footer-meta{font-size:11px;font-weight:600;color:var(--text3);}

    @media(max-width:600px){
      .profile-info{padding:0 20px;}
      .profile-avatar-wrap{left:20px;}
      .profile-info-top{flex-direction:column;align-items:flex-start;gap:12px;}
      .edit-grid{grid-template-columns:1fr;}
      .nav-top,.nav-sub{padding-left:16px;padding-right:16px;}
    }
  </style>
</head>
<body>

<div class="nav-wrap">
  <div class="nav-top">
    <a class="nav-logo" href="index.html">The Depth <span>Chart</span></a>
    <div class="nav-actions" id="navActions">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <a href="pricing.html" style="font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);text-decoration:none;">Sign In</a>
      <a href="pricing.html" class="nav-signin">Subscribe</a>
    </div>
  </div>
  <div class="nav-sub">
    <a href="index.html">Rankings</a>
    <a href="roster.html">Roster</a>
    <a href="forum.html">Forum</a>
    <a href="community.html">Community</a>
    <a href="about.html">About</a>
    <a href="pricing.html">Pricing</a>
  </div>
</div>

<div id="profileContent">
  <div class="loading-state"><div class="loading-spinner"></div>Loading profile...</div>
</div>

<footer>
  <div class="footer-logo">The Depth <span>Chart</span></div>
  <div class="footer-meta">College Basketball Roster Analysis · 2025–26</div>
</footer>

<script>
const SB  = 'https://izlqhnxowdhtdofkwrho.supabase.co';
const KEY = 'sb_publishable_XQKr9A5ZP79pe0ac1RKYvA_-0dAx9Ye';
const H   = {'apikey':KEY,'Authorization':`Bearer ${KEY}`,'Content-Type':'application/json'};

let currentUser = null;
let currentProfile = null;
let isOwnProfile = false;
let selectedBannerColor = '#8B6914';
let newAvatarFile = null;

const BANNER_COLORS = ['#8B6914','#003087','#CC0000','#1a8c3a','#461D7C','#FF8200','#0033A0','#111111','#2C5F2E','#97BC62'];

function getSession(){ return JSON.parse(localStorage.getItem('tdc_session')||'null'); }
function authH(tok){ return {...H,'Authorization':`Bearer ${tok}`}; }
function timeAgo(d){ const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

async function init(){
  const urlUser = new URLSearchParams(location.search).get('user');
  const s = getSession();

  // Try to get current user from session
  if(s?.access_token){
    try {
      const r = await fetch(`${SB}/auth/v1/user`,{
        headers:{'apikey':KEY,'Authorization':`Bearer ${s.access_token}`}
      });
      if(r.ok){
        currentUser = await r.json();
        // Load profile by auth user ID
        const pr = await fetch(`${SB}/rest/v1/profiles?id=eq.${currentUser.id}&select=*`,{headers:H});
        const profiles = await pr.json();
        currentProfile = profiles[0] || null;
        updateNav();
      }
    } catch(e){ console.log('Auth error',e); }
  }

  if(urlUser){
    // Viewing someone else's profile by username
    const r = await fetch(`${SB}/rest/v1/profiles?username=eq.${encodeURIComponent(urlUser)}&select=*`,{headers:H});
    const [profile] = await r.json();
    isOwnProfile = currentUser && profile?.id === currentUser.id;
    renderProfile(profile);
  } else if(currentUser){
    // Own profile
    isOwnProfile = true;
    // Use currentProfile or create a minimal one from auth user
    const profile = currentProfile || {
      id: currentUser.id,
      email: currentUser.email,
      username: null,
      avatar_url: null,
      bio: null,
      banner_color: '#8B6914',
      favorite_team: null,
      plan: 'free',
      created_at: currentUser.created_at
    };
    renderProfile(profile);
  } else {
    document.getElementById('profileContent').innerHTML=
      '<div class="loading-state" style="padding:60px;text-align:center;">Please <a href="pricing.html" style="color:var(--accent);font-weight:700;">sign in</a> to view your profile.</div>';
  }
}

function updateNav(){
  if(!currentUser) return;
  const uname = currentProfile?.username || currentUser.email?.split('@')[0] || 'User';
  const avatarHtml = currentProfile?.avatar_url
    ? `<img src="${currentProfile.avatar_url}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);" />`
    : `<div style="width:32px;height:32px;border-radius:50%;background:var(--bg2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);">${uname[0].toUpperCase()}</div>`;
  document.getElementById('navActions').innerHTML=`
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <a href="profile.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
      ${avatarHtml}
      <span style="font-size:13px;font-weight:700;color:var(--text);">${uname}</span>
    </a>`;
  const saved=localStorage.getItem('tdc_theme')||'light';
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=saved==='dark'?'☀️':'🌙';
}

function renderProfile(profile){
  if(!profile){ document.getElementById('profileContent').innerHTML='<div class="loading-state">Profile not found.</div>'; return; }
  const uname = profile.username || profile.email?.split('@')[0] || 'User';
  const banner = profile.banner_color || '#8B6914';
  selectedBannerColor = banner;
  const avatarHtml = profile.avatar_url
    ? `<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`
    : `<span>${uname[0].toUpperCase()}</span>`;
  const joined = new Date(profile.created_at||Date.now()).toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const bannerStyle = profile.banner_url
    ? `background-image:url('${profile.banner_url}');background-color:${banner};`
    : `background:${banner};`;

  const verifiedBadge = profile.verified
    ? `<span class="verified-badge" title="Verified"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>`
    : '';

  document.getElementById('profileContent').innerHTML=`
    <div class="profile-banner ${isOwnProfile?'editable':''}" style="${bannerStyle}" onclick="${isOwnProfile?'document.getElementById(\'bannerInput\').click()':''}">
      <div class="profile-banner-overlay">
        ${isOwnProfile?'<span class="profile-banner-edit-hint">📷 Change Banner</span>':''}
      </div>
      <div class="profile-avatar-wrap">
        <div class="profile-avatar">${avatarHtml}</div>
      </div>
      ${isOwnProfile?'<input type="file" id="bannerInput" accept="image/*" style="display:none;" onchange="uploadBanner(event)"/>':''}
    </div>

    <div class="profile-info">
      <div class="profile-info-top">
        <div>
          <div class="profile-username">${uname}${verifiedBadge}</div>
          ${profile.bio?`<div class="profile-bio">${profile.bio}</div>`:''}
          <div class="profile-meta">
            ${profile.favorite_team?`<div class="profile-meta-item">🏀 <strong>${profile.favorite_team}</strong></div>`:''}
            <div class="profile-meta-item">📅 Member since <strong>${joined}</strong></div>
            <div class="profile-meta-item">⭐ <strong>${profile.plan==='premium'?'Premium':'Free'}</strong></div>
          </div>
        </div>
        ${isOwnProfile?`<button class="edit-btn" onclick="showEditTab()">Edit Profile</button>`:''}
      </div>

      <div class="profile-tabs">
        <button class="profile-tab active" id="tab-posts" onclick="switchTab('posts')">Posts</button>
        ${isOwnProfile?`<button class="profile-tab" id="tab-edit" onclick="switchTab('edit')">Edit Profile</button>`:''}
        ${isOwnProfile?`<button class="profile-tab" id="tab-account" onclick="switchTab('account')">Account</button>`:''}
      </div>

      <div id="tab-content-posts">
        <div class="posts-section" id="postsList">
          <div class="loading-spinner" style="margin:20px auto;"></div>
        </div>
      </div>

      ${isOwnProfile?`
      <div id="tab-content-edit" style="display:none;">
        <div class="edit-section">
          <div class="msg" id="editMsg"></div>
          <div class="edit-grid">
            <div>
              <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-input" type="text" id="editUsername" value="${profile.username||''}" placeholder="Choose a username..." maxlength="30"/>
              </div>
              <div class="form-group">
                <label class="form-label">Bio</label>
                <textarea class="form-textarea" id="editBio" placeholder="Tell people about yourself...">${profile.bio||''}</textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Favorite Team</label>
                <select class="form-select" id="editTeam">
                  <option value="">Select a team...</option>
                </select>
              </div>
            </div>
            <div>
              <div class="form-group">
                <label class="form-label">Profile Picture</label>
                <div class="avatar-upload-area" onclick="document.getElementById('avatarInput').click()">
                  ${profile.avatar_url?`<img src="${profile.avatar_url}" class="avatar-preview" id="avatarPreview"/>`:`<div id="avatarPreview" style="width:80px;height:80px;border-radius:50%;background:var(--bg2);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--accent);">${uname[0].toUpperCase()}</div>`}
                  <div style="font-size:12px;color:var(--text3);">Click to upload photo</div>
                  <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="previewAvatar(event)"/>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Banner Color</label>
                <div class="color-swatches">
                  ${BANNER_COLORS.map(c=>`<div class="swatch${c===banner?' active':''}" style="background:${c};" onclick="selectBanner('${c}',this)" title="${c}"></div>`).join('')}
                </div>
              </div>
            </div>
          </div>
          <button class="form-btn" onclick="saveProfile()">Save Changes</button>
        </div>
      </div>

      <div id="tab-content-account" style="display:none;">
        <div class="edit-section">
          <div class="msg" id="accountMsg"></div>
          <div style="border:1px solid var(--border);padding:20px;margin-bottom:20px;">
            <div style="font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;">Subscription</div>
            <div style="font-size:14px;font-weight:600;margin-bottom:6px;">Plan: <span style="color:var(--accent);">${profile.plan==='premium'?'Premium':'Free'}</span></div>
            ${profile.sub_expires_at?`<div style="font-size:13px;color:var(--text3);">Expires: ${new Date(profile.sub_expires_at).toLocaleDateString()}</div>`:''}
            ${profile.plan!=='premium'?`<a href="pricing.html" style="display:inline-block;margin-top:12px;padding:8px 20px;background:var(--text);color:var(--bg);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;">Upgrade to Premium</a>`:''}
          </div>
          <button class="form-btn" style="background:var(--red);" onclick="signOut()">Sign Out</button>
        </div>
      </div>`:''}
    </div>`;

  loadUserPosts(profile.id||profile.author_id);
  loadTeamsForEdit(profile.favorite_team);
}

async function loadUserPosts(userId){
  try {
    const r = await fetch(`${SB}/rest/v1/forum_topics?author_id=eq.${userId}&select=*&order=created_at.desc`,{headers:H});
    const posts = await r.json();
    const el = document.getElementById('postsList');
    if(!el) return;
    if(!posts.length){ el.innerHTML='<div style="padding:20px;color:var(--text3);font-size:13px;">No posts yet.</div>'; return; }
    el.innerHTML = posts.map(p=>`
      <div class="post-item" onclick="location.href='forum.html'">
        <div class="post-title">${p.title}</div>
        <div class="post-meta">${p.category} · ${p.reply_count||0} replies · ${timeAgo(p.created_at)}</div>
      </div>`).join('');
  } catch(e){}
}

async function loadTeamsForEdit(favTeam){
  const sel = document.getElementById('editTeam');
  if(!sel) return;
  try {
    const r = await fetch(`${SB}/rest/v1/teams?select=name&order=name.asc`,{headers:H});
    const teams = await r.json();
    sel.innerHTML = '<option value="">No favorite</option>' + teams.map(t=>`<option value="${t.name}"${t.name===favTeam?' selected':''}>${t.name}</option>`).join('');
  } catch(e){}
}

function switchTab(tab){
  ['posts','edit','account'].forEach(t=>{
    const btn=document.getElementById('tab-'+t);
    const content=document.getElementById('tab-content-'+t);
    if(btn) btn.classList.toggle('active',t===tab);
    if(content) content.style.display=t===tab?'block':'none';
  });
}

function showEditTab(){ switchTab('edit'); document.getElementById('tab-content-edit')?.scrollIntoView({behavior:'smooth'}); }

function selectBanner(color, el){
  selectedBannerColor=color;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.querySelector('.profile-banner').style.background=color;
}

function previewAvatar(e){
  const file=e.target.files[0];
  if(!file) return;
  newAvatarFile=file;
  const reader=new FileReader();
  reader.onload=ev=>{
    const prev=document.getElementById('avatarPreview');
    if(prev.tagName==='IMG') prev.src=ev.target.result;
    else prev.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
  };
  reader.readAsDataURL(file);
}

let newBannerFile = null;

async function uploadBanner(e){
  const file = e.target.files[0];
  if(!file) return;
  newBannerFile = file;
  // Preview immediately
  const reader = new FileReader();
  reader.onload = ev => {
    document.querySelector('.profile-banner').style.backgroundImage = `url('${ev.target.result}')`;
  };
  reader.readAsDataURL(file);
}

async function saveProfile(){
  const s = getSession();
  if(!s) return;
  const username = document.getElementById('editUsername').value.trim();
  const bio      = document.getElementById('editBio').value.trim();
  const team     = document.getElementById('editTeam').value;

  let avatar_url = currentProfile?.avatar_url || null;
  let banner_url = currentProfile?.banner_url || null;

  // Upload avatar if new one selected
  if(newAvatarFile){
    try {
      const ext = newAvatarFile.name.split('.').pop();
      const path = `${currentUser.id}/avatar.${ext}`;
      const uploadR = await fetch(`${SB}/storage/v1/object/avatars/${path}`,{
        method:'POST',
        headers:{'apikey':KEY,'Authorization':`Bearer ${s.access_token}`,'Content-Type':newAvatarFile.type,'x-upsert':'true'},
        body:newAvatarFile
      });
      if(uploadR.ok) avatar_url = `${SB}/storage/v1/object/public/avatars/${path}?t=${Date.now()}`;
    } catch(e){ showMsg('editMsg','Avatar upload failed but other changes will save.','error'); }
  }

  // Upload banner if new one selected
  if(newBannerFile){
    try {
      const ext = newBannerFile.name.split('.').pop();
      const path = `${currentUser.id}/banner.${ext}`;
      const uploadR = await fetch(`${SB}/storage/v1/object/avatars/${path}`,{
        method:'POST',
        headers:{'apikey':KEY,'Authorization':`Bearer ${s.access_token}`,'Content-Type':newBannerFile.type,'x-upsert':'true'},
        body:newBannerFile
      });
      if(uploadR.ok) banner_url = `${SB}/storage/v1/object/public/avatars/${path}?t=${Date.now()}`;
    } catch(e){ showMsg('editMsg','Banner upload failed but other changes will save.','error'); }
  }

  try {
    const r = await fetch(`${SB}/rest/v1/profiles?id=eq.${currentUser.id}`,{
      method:'PATCH',
      headers:{...authH(s.access_token),'Prefer':'return=minimal'},
      body:JSON.stringify({
        username:username||null, bio:bio||null,
        favorite_team:team||null, banner_color:selectedBannerColor,
        avatar_url, banner_url,
        updated_at:new Date().toISOString()
      })
    });
    if(!r.ok) throw new Error(await r.text());
    localStorage.setItem('tdc_fav', team);
    showMsg('editMsg','Profile saved!','success');
    setTimeout(()=>location.reload(), 1000);
  } catch(e){
    showMsg('editMsg', e.message.includes('profiles_username_key')
      ? 'That username is already taken. Try another.'
      : 'Could not save profile.', 'error');
  }
}

async function signOut(){
  const s=getSession();
  if(s) await fetch(`${SB}/auth/v1/logout`,{method:'POST',headers:{...H,'Authorization':`Bearer ${s.access_token}`}}).catch(()=>{});
  localStorage.removeItem('tdc_session');
  location.href='index.html';
}

function showMsg(id,text,type){
  const el=document.getElementById(id);
  if(!el) return;
  el.textContent=text; el.className=`msg ${type} show`;
}

function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const next=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('tdc_theme',next);
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=next==='dark'?'☀️':'🌙';
}
(function(){
  const saved=localStorage.getItem('tdc_theme')||'light';
  document.documentElement.setAttribute('data-theme',saved);
  window.addEventListener('DOMContentLoaded',()=>{
    const btn=document.getElementById('themeBtn');
    if(btn) btn.textContent=saved==='dark'?'☀️':'🌙';
  });
})();

init();
</script>
