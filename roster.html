<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Player Database — The Depth Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#ffffff;--bg2:#f5f5f5;--border:#e0e0e0;--border2:#cccccc;--text:#111111;--text2:#444444;--text3:#888888;--accent:#8B6914;--green:#1a8c3a;--blue:#1a5fbf;--amber:#a06000;--red:#cc2200;}
    [data-theme="dark"]{--bg:#111111;--bg2:#181818;--border:#2a2a2a;--border2:#333;--text:#e8e8e8;--text2:#a0a0a0;--text3:#606060;--accent:#c8a96e;}
    [data-theme="dark"] .nav-signin{background:var(--text)!important;color:var(--bg)!important;}
    [data-theme="dark"] .filter-select,[data-theme="dark"] .filter-input{background:var(--bg2);color:var(--text);}
    [data-theme="dark"] .gAp,[data-theme="dark"] .gA,[data-theme="dark"] .gAm{color:#5ab875;}
    [data-theme="dark"] .gBp,[data-theme="dark"] .gB,[data-theme="dark"] .gBm{color:#74aedd;}
    [data-theme="dark"] .gCp,[data-theme="dark"] .gC,[data-theme="dark"] .gCm{color:#dbb560;}
    [data-theme="dark"] .gDp,[data-theme="dark"] .gD,[data-theme="dark"] .gDm,[data-theme="dark"] .gF{color:#e07070;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:500;min-height:100vh;-webkit-font-smoothing:antialiased;}

    /* NAV */
    .nav-wrap{border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
    .nav-top{padding:0 40px;height:52px;display:flex;align-items:center;justify-content:space-between;min-width:0;}
    .nav-logo{font-family:'Playfair Display',serif;font-weight:800;font-size:20px;color:var(--text);text-decoration:none;letter-spacing:-.01em;white-space:nowrap;}
    .nav-logo span{color:var(--accent);}
    .nav-actions{display:flex;align-items:center;gap:16px;}
    .nav-actions a{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);text-decoration:none;}
    .nav-actions a:hover{color:var(--text);}
    .nav-signin{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bg);background:var(--text);padding:6px 16px;text-decoration:none;}
    .theme-toggle{background:none;border:1px solid var(--border2);color:var(--text3);font-size:14px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .nav-sub{border-top:1px solid var(--border);padding:0 40px;height:36px;display:flex;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .nav-sub::-webkit-scrollbar{display:none;}
    .nav-sub a{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-decoration:none;padding:0 16px;height:100%;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
    .nav-sub a:first-child{padding-left:0;}
    .nav-sub a:hover,.nav-sub a.active{color:var(--text);border-bottom-color:var(--accent);}

    /* PAGE HEADER */
    .page-header{padding:40px 40px 28px;border-bottom:1px solid var(--border);}
    .page-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:10px;}
    .page-eyebrow::before{content:'';width:20px;height:1px;background:var(--accent);}
    .page-h1{font-family:'Playfair Display',serif;font-weight:800;font-size:40px;line-height:1;letter-spacing:-.02em;margin-bottom:10px;}
    .page-meta{font-size:13px;color:var(--text3);}

    /* FILTER BAR */
    .filter-bar{padding:14px 40px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .filter-select{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;background:var(--bg);border:1px solid var(--border2);color:var(--text2);padding:6px 10px;outline:none;cursor:pointer;}
    .filter-select:focus{border-color:var(--accent);}
    .filter-input{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:6px 10px;outline:none;width:180px;}
    .filter-input:focus{border-color:var(--accent);}
    .filter-input::placeholder{color:var(--text3);}
    .filter-count{margin-left:auto;font-size:12px;font-weight:600;color:var(--text3);}
    .filter-count strong{color:var(--accent);}
    .clear-btn{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;}
    .clear-btn:hover{color:var(--text);}

    /* TABLE */
    .table-wrap{padding:0 40px 60px;overflow-x:auto;}
    .roster-table{width:100%;border-collapse:collapse;min-width:800px;}
    .roster-table th{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:10px 12px;border-bottom:2px solid var(--border2);text-align:left;white-space:nowrap;cursor:pointer;user-select:none;background:var(--bg);}
    .roster-table th:hover{color:var(--text);}
    .roster-table th.sorted{color:var(--accent);}
    .roster-table th .sort-arrow{margin-left:4px;font-size:9px;}
    .roster-table th.right,.roster-table td.right{text-align:right;}
    .roster-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);white-space:nowrap;}
    .roster-table tr:hover td{background:var(--bg2);}
    .td-name{font-family:'Playfair Display',serif;font-weight:700;font-size:14px;color:var(--text);}
    .td-team{font-size:12px;color:var(--text3);}
    .td-team a{color:var(--text3);text-decoration:none;font-weight:600;}
    .td-team a:hover{color:var(--accent);}
    .td-pos{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);}
    .td-ht{font-family:'Playfair Display',serif;font-size:13px;}
    .td-stat{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;text-align:right;background:var(--bg2);padding:2px 6px;border-radius:2px;}
    .td-grade{font-family:'Playfair Display',serif;font-weight:800;font-size:17px;text-align:right;letter-spacing:-.01em;}
    .gAp{color:var(--green);}.gA{color:var(--green);}.gAm{color:#2ea84f;}
    .gBp{color:var(--blue);}.gB{color:var(--blue);}.gBm{color:#2e74d4;}
    .gCp{color:var(--amber);}.gC{color:var(--amber);}.gCm{color:#b87000;}
    .gDp{color:var(--red);}.gD{color:var(--red);}.gDm{color:#dd3300;}.gF{color:#aa0000;}
    /* 2K Number Rating Colors */
    .g-elite{color:#18c45a;font-weight:800;}
    .g-great{color:#7bc832;font-weight:800;}
    .g-good{color:#c8b432;font-weight:800;}
    .g-avg{color:#e08020;font-weight:800;}
    .g-below{color:#e05030;font-weight:800;}
    .g-low{color:#cc2020;font-weight:800;}
    [data-theme="dark"] .g-elite{color:#22e06a;}
    [data-theme="dark"] .g-great{color:#96e040;}
    [data-theme="dark"] .g-good{color:#e0d040;}
    [data-theme="dark"] .g-avg{color:#e89040;}
    [data-theme="dark"] .g-below{color:#e86050;}
    [data-theme="dark"] .g-low{color:#e04040;}
    .starter-badge{font-size:9px;font-weight:700;padding:1px 4px;margin-left:4px;background:rgba(139,105,20,.12);color:var(--accent);}
    .conf-badge{font-size:9px;font-weight:700;letter-spacing:.06em;padding:1px 6px;border:1px solid var(--border2);color:var(--text3);}

    .loading-state{text-align:center;padding:80px 40px;color:var(--text3);}
    .loading-spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty-state{text-align:center;padding:60px 40px;color:var(--text3);font-size:14px;}

    footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;}
    .footer-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--text3);}
    .footer-logo span{color:var(--accent);}
    .footer-meta{font-size:11px;font-weight:600;color:var(--text3);}

    @media(max-width:768px){
      .nav-top{padding:0 16px;height:44px;}
      .nav-logo{font-size:17px;}
      .nav-sub{padding:0 16px;}
      .page-header{padding:28px 16px 20px;}
      .page-h1{font-size:28px;}
      .filter-bar{padding:10px 16px;}
      .filter-input{width:140px;}
      .table-wrap{padding:0 0 60px;}
    }
  </style>
</head>
<body>

<div class="nav-wrap">
  <div class="nav-top">
    <a class="nav-logo" href="index.html">The Depth <span>Chart</span></a>
    <div class="nav-actions" id="navActions">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle dark mode">🌙</button>
      <a href="pricing.html" style="font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);text-decoration:none;">Sign In</a>
      <a href="pricing.html" class="nav-signin">Subscribe</a>
    </div>
  </div>
  <div class="nav-sub">
    <a href="index.html">Rankings</a>
    <a href="roster.html" class="active">Players</a>
    <a href="community.html">Community</a>
    <a href="about.html">About</a>
    <a href="pricing.html">Pricing</a>
  </div>
</div>

<div class="page-header">
  <div class="page-eyebrow">Database</div>
  <h1 class="page-h1">Player Database</h1>
  <div class="page-meta" id="pageMeta">Loading players...</div>
</div>

<div class="filter-bar">
  <select class="filter-select" id="confFilter" onchange="applyFilters()">
    <option value="">All Conferences</option>
    <option value="ACC">ACC</option>
    <option value="B10">Big Ten</option>
    <option value="B12">Big 12</option>
    <option value="BE">Big East</option>
    <option value="SEC">SEC</option>
    <option value="P12">Pac-12</option>
    <option value="A10">A-10</option>
    <option value="AAC">AAC</option>
  </select>
  <select class="filter-select" id="teamFilter" onchange="applyFilters()">
    <option value="">All Teams</option>
  </select>
  <select class="filter-select" id="posFilter" onchange="applyFilters()">
    <option value="">All Positions</option>
    <option value="PG">PG</option>
    <option value="SG">SG</option>
    <option value="CG">CG</option>
    <option value="SF">SF</option>
    <option value="PF">PF</option>
    <option value="C">C</option>
  </select>
  <select class="filter-select" id="yrFilter" onchange="applyFilters()">
    <option value="">All Years</option>
    <option value="Fr.">Fr.</option>
    <option value="R-Fr.">R-Fr.</option>
    <option value="So.">So.</option>
    <option value="R-So.">R-So.</option>
    <option value="Jr.">Jr.</option>
    <option value="R-Jr.">R-Jr.</option>
    <option value="Sr.">Sr.</option>
    <option value="R-Sr.">R-Sr.</option>
    <option value="Gr.">Gr.</option>
  </select>
  <select class="filter-select" id="htFilter" onchange="applyFilters()">
    <option value="">All Heights</option>
    <option value="5">5'</option>
    <option value="6-0">6'0"–6'2"</option>
    <option value="6-3">6'3"–6'5"</option>
    <option value="6-6">6'6"–6'8"</option>
    <option value="6-9">6'9"+</option>
  </select>
  <select class="filter-select" id="gradeFilter" onchange="applyFilters()">
    <option value="">All Ratings</option>
    <option value="90">90–99 (Elite)</option>
    <option value="80">80–89 (Great)</option>
    <option value="70">70–79 (Good)</option>
    <option value="60">60–69 (Average)</option>
    <option value="50">50–59 (Below Avg)</option>
    <option value="0">Under 50</option>
  </select>
  <input class="filter-input" type="text" id="searchInput" placeholder="Search player..." oninput="applyFilters()"/>
  <button class="clear-btn" onclick="clearFilters()">Clear</button>
  <span class="filter-count" id="countEl"></span>
</div>

<div class="table-wrap">
  <div id="tableContainer">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      Loading roster database...
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">The Depth <span>Chart</span></div>
  <div class="footer-meta">College Basketball Roster Analysis · 2025–26</div>
</footer>

<script>
const SB  = 'https://izlqhnxowdhtdofkwrho.supabase.co';
const KEY = 'sb_publishable_XQKr9A5ZP79pe0ac1RKYvA_-0dAx9Ye';
const H   = {'apikey':KEY,'Authorization':`Bearer ${KEY}`};

let allPlayers = [];
let allTeams   = [];
let sortCol    = 'tdc_grade';
let sortDir    = 1;

function gc(g){
  const n = parseInt(g);
  if(isNaN(n)) return '';
  if(n >= 90) return 'g-elite';
  if(n >= 80) return 'g-great';
  if(n >= 70) return 'g-good';
  if(n >= 60) return 'g-avg';
  if(n >= 50) return 'g-below';
  return 'g-low';
}
function fmt(v){ return (v!==null&&v!==undefined&&v!=='') ? Number(v).toFixed(1) : '—'; }

// Height to inches for sorting
function htToIn(h){
  if(!h) return 0;
  const m = h.match(/(\d+)'(\d+)?/);
  if(!m) return 0;
  return parseInt(m[1])*12 + (parseInt(m[2])||0);
}

// Height filter matching
function htMatch(h, filter){
  if(!filter) return true;
  const inches = htToIn(h);
  if(filter==='5')   return inches < 72;
  if(filter==='6-0') return inches >= 72 && inches <= 74;
  if(filter==='6-3') return inches >= 75 && inches <= 77;
  if(filter==='6-6') return inches >= 78 && inches <= 80;
  if(filter==='6-9') return inches >= 81;
  return true;
}

async function loadData(){
  try {
    // Load teams for team filter + conference lookup
    const tr = await fetch(`${SB}/rest/v1/teams?select=name,conference,conf,color&order=name.asc`, {headers:H});
    allTeams = await tr.json();

    // Populate team dropdown
    const teamSel = document.getElementById('teamFilter');
    allTeams.forEach(t => {
      const o = document.createElement('option');
      o.value = t.name; o.textContent = t.name;
      teamSel.appendChild(o);
    });

    // Load all players with explicit column selection
    const pr = await fetch(`${SB}/rest/v1/players?select=id,name,team,position,height,class_year,yr,starter,is_addition,tdc_grade,ppg,rpg,apg,mpg,bpm,depth_order&order=name.asc&limit=5000`, {headers:H});
    const raw = await pr.json();

    // Attach team info to each player
    const teamMap = {};
    allTeams.forEach(t => teamMap[t.name] = t);

    allPlayers = raw.filter(p => p.name && p.name !== '—').map(p => ({
      ...p,
      teamData: teamMap[p.team] || {},
      conf: (teamMap[p.team]||{}).conf || (teamMap[p.team]||{}).conference || '',
    }));

    document.getElementById('pageMeta').textContent =
      `${allPlayers.length} players across ${allTeams.length} programs`;

    applyFilters();
  } catch(e){
    document.getElementById('tableContainer').innerHTML =
      '<div class="empty-state">Could not load roster data.</div>';
  }
}

function applyFilters(){
  const conf   = document.getElementById('confFilter').value;
  const team   = document.getElementById('teamFilter').value;
  const pos    = document.getElementById('posFilter').value;
  const yr     = document.getElementById('yrFilter').value;
  const ht     = document.getElementById('htFilter').value;
  const grade  = document.getElementById('gradeFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  let filtered = allPlayers.filter(p => {
    if(conf   && p.conf !== conf) return false;
    if(team   && p.team !== team) return false;
    if(pos    && p.position !== pos) return false;
    if(yr     && (p.class_year||p.yr) !== yr) return false;
    if(ht     && !htMatch(p.height, ht)) return false;
    if(grade) {
      const n = parseInt(p.tdc_grade);
      const min = parseInt(grade);
      const max = min === 0 ? 49 : min + 9;
      if(isNaN(n) || n < min || n > max) return false;
    }
    if(search && !p.name.toLowerCase().includes(search) && !(p.team||'').toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort
  filtered.sort((a,b) => {
    let av, bv;
    if(['ppg','rpg','apg','mpg','bpm'].includes(sortCol)){
      av = a[sortCol]??-999; bv = b[sortCol]??-999;
      return (bv-av)*sortDir;
    }
    if(sortCol==='height'){ av=htToIn(a.height); bv=htToIn(b.height); return (bv-av)*sortDir; }
    if(sortCol==='tdc_grade'){
      av = parseInt(a.tdc_grade??'0') || 0;
      bv = parseInt(b.tdc_grade??'0') || 0;
      return (bv-av)*sortDir;
    }
    av=(a[sortCol]||'').toLowerCase(); bv=(b[sortCol]||'').toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });

  document.getElementById('countEl').innerHTML =
    `<strong>${filtered.length}</strong> of ${allPlayers.length} players`;

  renderTable(filtered);
}

function renderTable(players){
  if(!players.length){
    document.getElementById('tableContainer').innerHTML =
      '<div class="empty-state">No players match your filters.</div>';
    return;
  }

  const arrow = dir => dir===1 ? '↑' : '↓';
  const col = (id,label,cls='') => {
    const sorted = sortCol===id;
    return `<th class="${sorted?'sorted':''} ${cls}" onclick="setSort('${id}')">${label}<span class="sort-arrow">${sorted?arrow(sortDir):''}</span></th>`;
  };

  document.getElementById('tableContainer').innerHTML = `
    <table class="roster-table">
      <thead>
        <tr>
          ${col('name','Player')}
          ${col('team','Team')}
          ${col('conf','Conf')}
          ${col('position','Pos')}
          ${col('height','Ht')}
          ${col('class_year','Yr')}
          ${col('ppg','PPG','right')}
          ${col('rpg','RPG','right')}
          ${col('apg','APG','right')}
          ${col('mpg','MPG','right')}
          ${col('bpm','BPM','right')}
          ${col('tdc_grade','OVR','right')}
        </tr>
      </thead>
      <tbody>
        ${players.map(p => {
          const color = p.teamData?.color || '#888';
          const hex = color.replace('#','');
          const r = parseInt(hex.slice(0,2),16)||100;
          const g = parseInt(hex.slice(2,4),16)||100;
          const b2 = parseInt(hex.slice(4,6),16)||100;
          // Calculate luminance to decide text color
          const luminance = (0.299*r + 0.587*g + 0.114*b2) / 255;
          const textColor = luminance > 0.5 ? '#111' : '#fff';
          const yr    = p.class_year||p.yr||'';
          return `<tr>
            <td>
              <div class="td-name">${p.name}${p.starter?`<span class="starter-badge">*</span>`:''}</div>
            </td>
            <td>
              <div class="td-team"><a href="team.html?team=${encodeURIComponent(p.team)}" style="color:${textColor};font-weight:700;background:${color};padding:2px 8px;border-radius:2px;">${p.team||'—'}</a></div>
            </td>
            <td><span class="conf-badge">${p.conf||'—'}</span></td>
            <td><span class="td-pos">${p.position||'—'}</span></td>
            <td class="td-ht">${p.height||'—'}</td>
            <td>${yr}</td>
            <td class="td-stat right">${fmt(p.ppg)}</td>
            <td class="td-stat right">${fmt(p.rpg)}</td>
            <td class="td-stat right">${fmt(p.apg)}</td>
            <td class="td-stat right">${fmt(p.mpg)}</td>
            <td class="td-stat right">${fmt(p.bpm)}</td>
            <td class="td-grade ${gc(p.tdc_grade||'')} right">${p.tdc_grade||'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function setSort(col){
  if(sortCol===col) sortDir*=-1;
  else { sortCol=col; sortDir=1; }
  applyFilters();
}

function clearFilters(){
  ['confFilter','teamFilter','posFilter','yrFilter','htFilter','gradeFilter']
    .forEach(id=>document.getElementById(id).value='');
  document.getElementById('searchInput').value='';
  applyFilters();
}

// Theme
function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const next=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('tdc_theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙';
}
(function(){
  const saved=localStorage.getItem('tdc_theme')||'light';
  document.documentElement.setAttribute('data-theme',saved);
  window.addEventListener('DOMContentLoaded',()=>{
    const btn=document.getElementById('themeBtn');
    if(btn) btn.textContent=saved==='dark'?'☀️':'🌙';
  });
})();

loadData();
</script>
<script>
// Auth nav update
(function(){
  const s = JSON.parse(localStorage.getItem('tdc_session')||'null');
  if(!s?.access_token||!s?.user?.id) return;
  fetch('https://izlqhnxowdhtdofkwrho.supabase.co/rest/v1/profiles?id=eq.'+s.user.id+'&select=username,avatar_url,plan,verified',
    {headers:{'apikey':'sb_publishable_XQKr9A5ZP79pe0ac1RKYvA_-0dAx9Ye','Authorization':'Bearer '+s.access_token}})
  .then(r=>r.json()).then(([profile])=>{
    if(!profile) return;
    const uname = profile.username || s.user?.email?.split('@')[0] || 'User';
    const avatarHtml = profile.avatar_url
      ? '<img src="'+profile.avatar_url+'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);" />'
      : '<div style="width:32px;height:32px;border-radius:50%;background:var(--bg2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);font-size:14px;">'+uname[0].toUpperCase()+'</div>';
    const verifiedHtml = profile.verified
      ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--accent);border-radius:50%;margin-left:3px;flex-shrink:0;"><svg viewBox=\"0 0 24 24\" style=\"width:9px;height:9px;fill:#fff;\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg></span>'
      : '';
    const actions = document.getElementById('navActions');
    if(actions){
      actions.innerHTML = '<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">'+
        (localStorage.getItem('tdc_theme')==='dark'?'☀️':'🌙')+
        '</button><a href="profile.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">'+
        avatarHtml+'<span style="display:flex;align-items:center;font-size:13px;font-weight:700;color:var(--text);">'+uname+verifiedHtml+'</span></a>';
    }
  }).catch(()=>{});
})();</script>
</body>
</html>
