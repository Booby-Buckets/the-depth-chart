<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team — The Depth Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,600;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;--border:#e0e0e0;--border2:#cccccc;--text:#111111;--text2:#444444;--text3:#888888;--accent:#8B6914;--tc:#003087;--tc-rgb:0,48,135;--green:#1a8c3a;--red:#cc2200;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:500;min-height:100vh;-webkit-font-smoothing:antialiased;opacity:0;animation:fadeIn .3s ease forwards;}
    @keyframes fadeIn{to{opacity:1;}}

    /* NAV */
    .nav-wrap{border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border);}
    .nav-top{padding:0 40px;height:52px;display:flex;align-items:center;justify-content:space-between;}
    .nav-logo{font-family:'Playfair Display',serif;font-weight:800;font-size:20px;color:var(--text);text-decoration:none;letter-spacing:-.01em;}
    .nav-logo span{color:var(--accent);}
    .nav-actions{display:flex;align-items:center;gap:24px;}
    .nav-actions a{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);text-decoration:none;}
    .nav-actions a:hover{color:var(--text);}
    .nav-signin{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bg);background:var(--text);border:none;padding:6px 16px;cursor:pointer;}
    .nav-sub{border-top:1px solid var(--border);padding:0 40px;height:36px;display:flex;align-items:center;}
    .nav-sub a{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-decoration:none;padding:0 16px;height:100%;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .15s;}
    .nav-sub a:first-child{padding-left:0;}
    .nav-sub a:hover,.nav-sub a.active{color:var(--text);border-bottom-color:var(--accent);}
    .breadcrumb{padding:10px 40px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);}
    .breadcrumb a{color:var(--text3);text-decoration:none;}
    .breadcrumb a:hover{color:var(--text);}

    /* HERO */
    .team-hero{padding:40px 40px 0;background:linear-gradient(135deg,rgba(var(--tc-rgb),.15) 0%,rgba(var(--tc-rgb),.08) 35%,rgba(var(--tc-rgb),.02) 65%,transparent 100%);border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
    .hero-color-line{position:absolute;top:0;left:0;right:0;height:3px;background:var(--tc);}
    .hero-top{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;flex-wrap:wrap;margin-bottom:28px;}
    .hero-conf{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--tc);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
    .hero-conf::before{content:'';width:16px;height:1px;background:var(--tc);}
    .hero-name{font-family:'Playfair Display',serif;font-weight:800;font-size:56px;line-height:.95;letter-spacing:-.02em;color:var(--text);margin-bottom:6px;}
    .hero-nickname{font-family:'Source Serif 4',serif;font-style:italic;font-size:20px;color:var(--text3);margin-bottom:14px;}
    .hero-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .hero-record{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--text2);}
    .hero-coach{font-size:12px;color:var(--text3);font-style:italic;}
    .hero-rank{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--tc);color:var(--tc);}
    .hero-grades{display:flex;gap:1px;background:var(--border);flex-shrink:0;}
    .hero-grade{background:var(--bg2);padding:16px 24px;text-align:center;min-width:88px;}
    .hero-grade-val{font-family:'Playfair Display',serif;font-weight:700;font-size:32px;line-height:1;margin-bottom:4px;}
    .hero-grade-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
    .hero-tabs{display:flex;gap:0;border-top:1px solid var(--border);}
    .hero-tab{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:12px 20px;color:var(--text3);cursor:pointer;border:none;background:none;border-top:2px solid transparent;transition:all .15s;margin-top:-1px;}
    .hero-tab:hover{color:var(--text2);}
    .hero-tab.active{color:var(--text);border-top-color:var(--tc);}

    /* LAYOUT */
    .page-body{display:grid;grid-template-columns:1fr 320px;}
    .main-col{padding:32px 40px 64px;border-right:1px solid var(--border);}
    .side-col{padding:32px 32px 64px;}
    .panel{display:none;}.panel.active{display:block;}

    /* SECTION HEADS */
    .sec-head{font-family:'Playfair Display',serif;font-weight:700;font-size:18px;letter-spacing:-.01em;color:var(--text);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--tc);display:flex;align-items:center;justify-content:space-between;}
    .sec-head-sub{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}

    /* STARTERS GRID */
    .starters-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:28px;}
    .starter-col{background:var(--bg2);}
    .starter-col-head{padding:8px 12px;background:rgba(var(--tc-rgb),.08);border-bottom:2px solid var(--tc);display:flex;align-items:center;justify-content:space-between;}
    .starter-pos{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text);}
    .starter-col-grade{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;}
    .starter-col-body{padding:10px 12px;}
    .starter-name{font-family:'Playfair Display',serif;font-weight:800;font-size:14px;line-height:1.2;color:var(--text);margin-bottom:3px;}
    .starter-meta-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);margin-bottom:5px;flex-wrap:wrap;}
    .starter-tag{font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;background:rgba(var(--tc-rgb),.15);color:var(--tc);}
    .backup-chain{border-top:1px solid var(--border);padding:6px 12px;display:flex;flex-direction:column;}
    .backup-item{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);}
    .backup-item:last-child{border-bottom:none;}
    .backup-num{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);width:12px;flex-shrink:0;}
    .backup-name{font-size:12px;font-weight:600;color:var(--text2);flex:1;}
    .backup-cls{font-size:10px;color:var(--text3);}
    .backup-grade{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;}

    /* FULL ROSTER LIST */
    .rotation-section{margin-top:8px;}
    .rotation-head{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:10px;}
    .rotation-head::after{content:'';flex:1;height:1px;background:var(--border);}
    .rotation-row{display:grid;grid-template-columns:28px 36px 1fr 38px 48px 48px 48px 48px 48px 44px;align-items:center;gap:6px;padding:10px 0;border-bottom:1px solid var(--border);}
    .rotation-row:last-child{border-bottom:none;}
    .rot-num{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--text3);text-align:center;}
    .rot-pos{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
    .rot-name{font-size:14px;font-weight:600;color:var(--text2);}
    .rot-cls{font-size:11px;color:var(--text3);}
    .rot-stat{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--text3);text-align:right;}
    .rot-stat.has-val{color:var(--text2);font-weight:700;}
    .rot-grade{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;text-align:right;letter-spacing:-.01em;}
    .stat-header{display:grid;grid-template-columns:28px 36px 1fr 38px 48px 48px 48px 48px 48px 44px;align-items:center;gap:6px;padding:6px 0;border-bottom:2px solid var(--border2);}
    .stat-header-cell{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:right;}
    .stat-header-cell.left{text-align:left;}

    /* GRADE COLORS */
    .gAp{color:#1a8c3a;}.gA{color:#1a8c3a;}.gAm{color:#2ea84f;}
    .gBp{color:#1a5fbf;}.gB{color:#1a5fbf;}.gBm{color:#2e74d4;}
    .gCp{color:#a06000;}.gC{color:#a06000;}.gCm{color:#b87000;}
    .gDp{color:#cc2200;}.gD{color:#cc2200;}.gDm{color:#dd3300;}.gF{color:#aa0000;}

    /* SIDEBAR */
    .side-card{background:var(--bg2);border:1px solid var(--border);margin-bottom:20px;overflow:hidden;}
    .side-card-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);border-left:3px solid transparent;}
    .side-card-body{padding:14px 16px;}
    .grade-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
    .grade-row:last-child{border-bottom:none;}
    .grade-row-label{font-size:12px;font-weight:600;color:var(--text3);font-style:italic;}
    .grade-row-val{font-family:'Playfair Display',serif;font-weight:700;font-size:18px;}
    .portal-item{display:flex;align-items:start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
    .portal-item:last-child{border-bottom:none;}
    .portal-pos{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);width:24px;flex-shrink:0;padding-top:2px;}
    .portal-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
    .portal-from{font-size:11px;font-weight:600;color:var(--text3);font-style:italic;}
    .empty-note{font-size:12px;color:var(--text3);padding:8px 0;}

    /* OUTLOOK */
    .outlook-text{font-family:'Source Serif 4',serif;font-size:14px;line-height:1.8;color:var(--text2);}
    .outlook-text p+p{margin-top:12px;}

    /* LOADING */
    .loading-state{text-align:center;padding:80px 40px;color:var(--text3);}
    .loading-spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;}
    .footer-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--text3);}
    .footer-logo span{color:var(--accent);}
    .footer-meta{font-size:11px;font-weight:600;color:var(--text3);}

    @media(max-width:960px){
      .page-body{grid-template-columns:1fr;}
      .side-col{border-top:1px solid var(--border);padding:24px 20px;}
      .main-col{padding:24px 20px;border-right:none;}
      .team-hero,.breadcrumb,.nav-top,.nav-sub{padding-left:20px;padding-right:20px;}
      .hero-name{font-size:36px;}
      .hero-grades{display:none;}
      .starters-grid{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>

<div class="nav-wrap">
  <div class="nav-top">
    <a class="nav-logo" href="index.html">The Depth <span>Chart</span></a>
    <div class="nav-actions">
      <a href="pricing.html">Pricing</a>
      <a href="login.html">Sign In</a>
      <button class="nav-signin">Subscribe</button>
    </div>
  </div>
  <div class="nav-sub">
    <a href="index.html">Rankings</a>
    <a href="#" class="active">Teams</a>
    <a href="pricing.html">Pricing</a>
  </div>
</div>

<div class="breadcrumb">
  <a href="index.html">Rankings</a> › <span id="bcTeam">Team</span>
</div>

<div class="team-hero" id="teamHero">
  <div class="hero-color-line" id="heroLine"></div>
  <div class="hero-top">
    <div>
      <div class="hero-conf" id="heroConf"></div>
      <div class="hero-name" id="heroName">Loading…</div>
      <div class="hero-nickname" id="heroNick"></div>
      <div class="hero-meta">
        <span class="hero-record" id="heroRecord"></span>
        <span class="hero-coach" id="heroCoach"></span>
        <span class="hero-rank" id="heroRank"></span>
      </div>
    </div>
    <div class="hero-grades" id="heroGrades"></div>
  </div>
  <div class="hero-tabs">
    <button class="hero-tab active" onclick="switchTab('depth',this)">Depth Chart</button>
    <button class="hero-tab" onclick="switchTab('analysis',this)">Analysis</button>
  </div>
</div>

<div class="page-body">
  <div class="main-col">
    <div class="panel active" id="panel-depth">
      <div class="sec-head">Depth Chart <span class="sec-head-sub" style="display:flex;align-items:center;gap:10px;"><span style="display:flex;align-items:center;gap:4px;"><span id="keyStarBadge" style="font-size:9px;font-weight:700;padding:1px 5px;background:rgba(0,0,0,.08);color:#888;">★</span><span>= Starter</span></span><span style="display:flex;align-items:center;gap:4px;"><span id="keyRetBadge" style="font-size:9px;font-weight:700;padding:1px 5px;background:rgba(0,0,0,.08);color:#888;">*</span><span>= Prev. Starter</span></span></span></div>
      <div id="depthContent">
        <div class="loading-state"><div class="loading-spinner"></div><div>Loading roster…</div></div>
      </div>
    </div>
    <div class="panel" id="panel-analysis">
      <div class="sec-head">Team Outlook</div>
      <div class="outlook-text" id="outlookText"></div>
    </div>
  </div>
  <div class="side-col">
    <div class="side-card">
      <div class="side-card-head" id="gradeCardHead" style="color:var(--tc);">Roster Grades</div>
      <div class="side-card-body" id="gradeCardBody"></div>
    </div>
    <div class="side-card">
      <div class="side-card-head" style="color:var(--green);">Offseason Additions</div>
      <div class="side-card-body" id="additionsBody"><div class="empty-note">Loading…</div></div>
    </div>
    <div class="side-card">
      <div class="side-card-head" style="color:var(--red);">Key Losses</div>
      <div class="side-card-body" id="lossesBody"><div class="empty-note">Loading…</div></div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">The Depth <span>Chart</span></div>
  <div class="footer-meta">College Basketball Roster Analysis · 2025–26</div>
</footer>

<script>
const SB_URL = 'https://izlqhnxowdhtdofkwrho.supabase.co';
const SB_KEY = 'sb_publishable_XQKr9A5ZP79pe0ac1RKYvA_-0dAx9Ye';
const H = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

function gc(g){return {"A+":"gAp","A":"gA","A-":"gAm","B+":"gBp","B":"gB","B-":"gBm","C+":"gCp","C":"gC","C-":"gCm","D+":"gDp","D":"gD","D-":"gDm","F":"gF"}[g]||"";}

function setColor(color, rgb){
  document.documentElement.style.setProperty('--tc', color);
  document.documentElement.style.setProperty('--tc-rgb', rgb || '100,100,100');
}

async function loadTeam(name){
  try {
    // Fetch team info
    const tr = await fetch(
      `${SB_URL}/rest/v1/teams?name=eq.${encodeURIComponent(name)}&select=*&limit=1`,
      { headers: H }
    );
    const teams = await tr.json();
    if(!teams.length) throw new Error('Team not found');
    const t = teams[0];

    // Fetch players for this team — strict depth_order only, no resorting
    const pr = await fetch(
      `${SB_URL}/rest/v1/players?team=eq.${encodeURIComponent(name)}&select=*&order=depth_order.asc`,
      { headers: H }
    );
    const players = await pr.json();

    // Fetch losses for this team
    const lr = await fetch(
      `${SB_URL}/rest/v1/losses?team=eq.${encodeURIComponent(name)}&select=*`,
      { headers: H }
    );
    const losses = await lr.json();

    // Compute color/rgb once and pass to all render functions
    const hex2rgb = h => {
      const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
      return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '100,100,100';
    };
    const teamColor = t.color || t.primary_color || '#888';
    const teamRgb   = hex2rgb(teamColor);

    renderHero(t, teamColor, teamRgb);
    renderDepth(t, players, teamColor, teamRgb);
    renderSidebar(t, players, losses, teamColor);
    renderOutlook(t);

  } catch(e){
    document.getElementById('depthContent').innerHTML =
      `<div style="padding:40px;text-align:center;color:var(--text3);">
        <div style="font-size:18px;margin-bottom:8px;">Could not load team data</div>
        <div style="font-size:12px;">${e.message}</div>
        <div style="font-size:11px;margin-top:8px;">Make sure data has been synced to Supabase.</div>
       </div>`;
  }
}

function renderHero(t, color, rgb){
  const color2 = t.color2 || t.secondary_color || '#111';
  setColor(color, rgb);

  document.title = `${t.name} — The Depth Chart`;
  document.getElementById('bcTeam').textContent = t.name;
  document.getElementById('heroLine').style.background = color;
  document.getElementById('heroConf').textContent = t.conference || '';
  document.getElementById('heroConf').style.color = color;
  document.getElementById('heroName').textContent = t.name;
  document.getElementById('heroNick').textContent = t.nickname || '';
  document.getElementById('heroRecord').textContent = t.record || '';
  document.getElementById('heroCoach').textContent = t.coach || t.head_coach ? `HC: ${t.coach||t.head_coach}` : '';
  document.getElementById('heroRank').textContent = t.tdc_rank ? `#${t.tdc_rank} TDC` : '';
  document.getElementById('heroRank').style.borderColor = color;
  document.getElementById('heroRank').style.color = color;
  document.getElementById('gradeCardHead').style.color = color;
  document.getElementById('gradeCardHead').style.borderLeftColor = color;
  document.querySelectorAll('.side-card-head').forEach(el => {
    el.style.borderLeftColor = color;
  });
  // Color the key badges
  const starBadge = document.getElementById('keyStarBadge');
  const retBadge  = document.getElementById('keyRetBadge');
  if(starBadge){ starBadge.style.background = `rgba(${rgb},.15)`; starBadge.style.color = color; }
  if(retBadge){  retBadge.style.background  = `rgba(${rgb},.15)`; retBadge.style.color  = color; }

  document.getElementById('heroGrades').innerHTML = [
    {val: t.roster_grade  || '—', lbl:'Roster'},
    {val: t.depth_grade   || '—', lbl:'Depth'},
    {val: t.recruit_grade || '—', lbl:'Recruit'},
    {val: t.nil_grade   || '—', lbl:'NIL Eval'},
    {val: t.nil_tier    || '—', lbl: (({'Tier 1':'$20M+','Tier 2':'$16-20M','Tier 3':'$11-16M','Tier 4':'$9-11M','Tier 5':'$6-9M','Tier 6':'$4-6M','Tier 7':'$2-4M','Tier 8':'$500K-2M','Tier 9':'$0-500K'})[t.nil_tier]||'NIL Tier')},
  ].map(g=>`
    <div class="hero-grade">
      <div class="hero-grade-val ${gc(g.val)}">${g.val}</div>
      <div class="hero-grade-label">${g.lbl}</div>
    </div>`).join('');
}

function renderDepth(t, players, color, rgb){

  // Strict sheet order
  const sorted = [...players].sort((a,b) => (a.depth_order||0) - (b.depth_order||0));

  const DEFAULT_POS = ['PG','SG/CG','SF','PF','C'];

  // First 5 rows from sheet = starter slots (blank rows included as empty slots)
  const starterSlots = [0,1,2,3,4].map(i => {
    const p = sorted[i] || null;
    if(p && (!p.name || p.name === '—' || p.name === '')) return null;
    return p;
  });
  // Bench = everything after position 5 that has an actual name
  // CG players count as SG for backup matching
  const bench = sorted.slice(5).filter(p => p.name && p.name !== '—' && p.name !== '');

  // Build starters grid — always exactly 5 columns
  const startersHtml = starterSlots.map((p, slotIdx) => {
    const defaultPos = DEFAULT_POS[slotIdx];
    // For backup matching: CG matches SG slot (slot index 1)
    const matchPos = p ? p.position : defaultPos;
    const matchPositions = (matchPos === 'SG' || matchPos === 'CG')
      ? ['SG','CG'] : [matchPos];
    const posBackups = bench.filter(b => matchPositions.includes(b.position));

    if(!p) return `<div class="starter-col">
      <div class="starter-col-head" style="border-bottom-color:${color};background:rgba(${rgb},.06);">
        <span class="starter-pos" style="color:var(--text3);">${defaultPos}</span>
      </div>
      <div class="starter-col-body" style="min-height:48px;display:flex;align-items:center;padding:10px 12px;">
        <span style="font-size:12px;color:var(--text3);font-style:italic;">—</span>
      </div>
    </div>`;

    const backupHtml = posBackups.length ? `
      <div class="backup-chain">
        ${posBackups.map((b,i)=>`
        <div class="backup-item">
          <span class="backup-num">${i+2}</span>
          <span class="backup-name">${b.name}</span>
          <span class="backup-cls">${b.class_year||b.yr||''}</span>
          <span class="backup-grade ${gc(b.tdc_grade||'')}">${b.tdc_grade||''}</span>
        </div>`).join('')}
      </div>` : '';

    return `<div class="starter-col">
      <div class="starter-col-head" style="border-bottom-color:${color};background:rgba(${rgb},.08);">
        <span class="starter-pos">${p.position||''}</span>
        <span class="starter-col-grade ${gc(p.tdc_grade||'')}">${p.tdc_grade||''}</span>
      </div>
      <div class="starter-col-body">
        <div class="starter-name">${p.name}</div>
        <div class="starter-meta-row">
          <span>${p.class_year||p.yr||''}</span>
          <span class="starter-tag" style="background:rgba(${rgb},.12);color:${color};">★</span>
          ${p.starter?`<span class="starter-tag" style="background:rgba(${rgb},.12);color:${color};">*</span>`:''}
        </div>
      </div>
      ${backupHtml}
    </div>`;
  }).join('');

  // Full roster list — strict sheet order, skip blank placeholder rows
  const fmt = v => (v !== null && v !== undefined && v !== '') ? Number(v).toFixed(1) : '—';
  const visiblePlayers = sorted.filter(p => p.name && p.name !== '—');

  const fullListHtml = `
    <div class="rotation-section">
      <div class="rotation-head">Full Roster — ${visiblePlayers.length} Players</div>
      <div class="stat-header">
        <div class="stat-header-cell"></div>
        <div class="stat-header-cell left">Pos</div>
        <div class="stat-header-cell left">Name</div>
        <div class="stat-header-cell">Yr</div>
        <div class="stat-header-cell">PPG</div>
        <div class="stat-header-cell">RPG</div>
        <div class="stat-header-cell">APG</div>
        <div class="stat-header-cell">MPG</div>
        <div class="stat-header-cell">BPM</div>
        <div class="stat-header-cell">Gr</div>
      </div>
      ${visiblePlayers.map((p,i)=>{
        const isStarter = sorted.indexOf(p) < 5;
        return `
      <div class="rotation-row" style="${isStarter?`background:rgba(${rgb},.04);border-left:2px solid ${color};padding-left:6px;`:''}">
        <div class="rot-num" style="${isStarter?`color:${color};font-weight:700;`:''}">${i+1}</div>
        <div class="rot-pos" style="${isStarter?`color:${color};`:''}">${p.position||''}</div>
        <div class="rot-name" style="${isStarter?'color:var(--text);font-weight:700;':''}">
          ${p.name}
          ${isStarter?`<span style="font-size:9px;font-weight:700;letter-spacing:.08em;padding:1px 5px;background:rgba(${rgb},.15);color:${color};">★</span>`:''}
          ${p.starter?`<span style="font-size:9px;font-weight:700;letter-spacing:.08em;padding:1px 5px;background:rgba(${rgb},.15);color:${color};">*</span>`:''}
          ${p.hometown?`<span style="font-size:10px;color:var(--text3);font-style:italic;margin-left:6px;">via ${p.hometown}</span>`:''}
        </div>
        <div class="rot-cls">${p.class_year||p.yr||''}</div>
        <div class="rot-stat ${p.ppg?'has-val':''}">${fmt(p.ppg)}</div>
        <div class="rot-stat ${p.rpg?'has-val':''}">${fmt(p.rpg)}</div>
        <div class="rot-stat ${p.apg?'has-val':''}">${fmt(p.apg)}</div>
        <div class="rot-stat ${p.mpg?'has-val':''}">${fmt(p.mpg)}</div>
        <div class="rot-stat ${p.bpm?'has-val':''}">${fmt(p.bpm)}</div>
        <div class="rot-grade ${gc(p.tdc_grade||'')}">${p.tdc_grade||''}</div>
      </div>`;}).join('')}
    </div>`;

  document.getElementById('depthContent').innerHTML =
    `<div class="starters-grid" style="grid-template-columns:repeat(5,1fr);">${startersHtml}</div>${fullListHtml}`;
}

function renderSidebar(t, players, losses, color){
  // Grades
  document.getElementById('gradeCardBody').innerHTML = [
    {label:'Overall Roster',   val: t.roster_grade  || '—'},
    {label:'Bench Depth',      val: t.depth_grade   || '—'},
    {label:'Recruiting Class', val: t.recruit_grade || '—'},
  ].map(g=>`
    <div class="grade-row">
      <span class="grade-row-label">${g.label}</span>
      <span class="grade-row-val ${gc(g.val)}">${g.val}</span>
    </div>`).join('');

  // Additions — players marked is_addition in DB
  const adds = players.filter(p => p.is_addition);
  document.getElementById('additionsBody').innerHTML = adds.length
    ? adds.map(a=>`
      <div class="portal-item">
        <span class="portal-pos">${a.position||''}</span>
        <div style="flex:1;">
          <div class="portal-name">${a.name}</div>
          <div class="portal-from">${a.class_year||a.yr||''}${a.hometown ? ' · via '+a.hometown : ''}</div>
        </div>
      </div>`).join('')
    : '<div class="empty-note">None listed</div>';

  // Losses from losses table
  document.getElementById('lossesBody').innerHTML = losses.length
    ? losses.map(l=>`
      <div class="portal-item">
        <span class="portal-pos">${l.pos||''}</span>
        <div style="flex:1;">
          <div class="portal-name">${l.name}</div>
          <div class="portal-from">${l.yr||''}</div>
        </div>
      </div>`).join('')
    : '<div class="empty-note">None listed</div>';
}

function renderOutlook(t){
  const text = t.outlook || '';
  document.getElementById('outlookText').innerHTML =
    text ? text.split('\n\n').map(p=>`<p>${p}</p>`).join('') :
    '<p style="color:var(--text3);font-style:italic;">No outlook written yet.</p>';
}

function switchTab(id, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.hero-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
}

// Init
const teamName = new URLSearchParams(window.location.search).get('team') || 'Duke';
loadTeam(teamName);
</script>
</body>
</html>
