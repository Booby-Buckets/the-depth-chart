<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recent Additions — The Depth Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#fff;--bg2:#f5f5f5;--border:#e0e0e0;--border2:#ccc;--text:#111;--text2:#444;--text3:#888;--accent:#8B6914;--green:#1a8c3a;--red:#cc2200;--blue:#1a5fbf;}
    [data-theme="dark"]{--bg:#111;--bg2:#181818;--border:#2a2a2a;--border2:#333;--text:#e8e8e8;--text2:#a0a0a0;--text3:#606060;--accent:#c8a96e;}
    [data-theme="dark"] .player-card{background:var(--bg2);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:500;min-height:100vh;}
    .nav-wrap{border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
    .nav-top{padding:0 40px;height:52px;display:flex;align-items:center;justify-content:space-between;min-width:0;}
    .nav-logo{font-family:'Playfair Display',serif;font-weight:800;font-size:20px;color:var(--text);text-decoration:none;white-space:nowrap;}
    .nav-logo span{color:var(--accent);}
    .nav-actions{display:flex;align-items:center;gap:14px;}
    .nav-signin{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bg);background:var(--text);padding:6px 16px;text-decoration:none;}
    .theme-toggle{background:none;border:1px solid var(--border2);color:var(--text3);font-size:14px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .nav-sub{border-top:1px solid var(--border);padding:0 40px;height:36px;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;}
    .nav-sub::-webkit-scrollbar{display:none;}
    .nav-sub a{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-decoration:none;padding:0 14px;height:100%;display:flex;align-items:center;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
    .nav-sub a:first-child{padding-left:0;}
    .nav-sub a:hover,.nav-sub a.active{color:var(--text);border-bottom-color:var(--accent);}

    .layout{max-width:900px;margin:0 auto;padding:40px;}
    .page-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:10px;}
    .page-eyebrow::before{content:'';width:20px;height:1px;background:var(--accent);}
    .page-h1{font-family:'Playfair Display',serif;font-weight:800;font-size:36px;letter-spacing:-.02em;margin-bottom:6px;}
    .page-sub{font-size:13px;color:var(--text3);margin-bottom:32px;}

    /* FILTER */
    .filter-row{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
    .filter-select{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;background:var(--bg2);border:1px solid var(--border2);color:var(--text2);padding:6px 10px;outline:none;cursor:pointer;}
    .filter-select:focus{border-color:var(--accent);}
    .count-badge{margin-left:auto;font-size:12px;font-weight:600;color:var(--text3);align-self:center;}
    .count-badge strong{color:var(--accent);}

    /* DATE SECTIONS */
    .date-section{margin-bottom:32px;}
    .date-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
    .date-label{font-family:'Playfair Display',serif;font-weight:800;font-size:20px;color:var(--text);}
    .date-count{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);}
    .date-line{flex:1;height:1px;background:var(--border);}

    /* PLAYER CARDS */
    .player-card{border:1px solid var(--border);padding:16px 20px;margin-bottom:8px;display:grid;grid-template-columns:44px 1fr auto;gap:12px;align-items:center;transition:border-color .15s;}
    .player-card:hover{border-color:var(--border2);}
    .player-pos{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-align:center;}
    .player-ht{font-size:11px;color:var(--text3);text-align:center;margin-top:2px;}
    .player-name{font-family:'Playfair Display',serif;font-weight:800;font-size:16px;color:var(--text);margin-bottom:4px;}
    .player-move{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;flex-wrap:wrap;}
    .move-from{color:var(--text3);}
    .move-arrow{font-size:16px;}
    .move-to{color:var(--accent);font-weight:700;}
    .player-yr{font-size:11px;color:var(--text3);margin-top:3px;}
    .player-right{text-align:right;flex-shrink:0;}
    .player-grade{font-family:'Playfair Display',serif;font-weight:800;font-size:20px;}
    .player-stats{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.6;}
    .gAp,.gA,.gAm{color:#1a8c3a;} .gBp,.gB,.gBm{color:#1a5fbf;}
    .gCp,.gC,.gCm{color:#a06000;} .gDp,.gD,.gDm,.gF{color:#cc2200;}

    .loading-state{text-align:center;padding:60px;color:var(--text3);}
    .loading-spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty-state{text-align:center;padding:60px;color:var(--text3);font-size:14px;}

    footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;margin-top:40px;}
    .footer-logo{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--text3);}
    .footer-logo span{color:var(--accent);}
    .footer-meta{font-size:11px;font-weight:600;color:var(--text3);}
    @media(max-width:600px){.layout{padding:20px;}.nav-top,.nav-sub{padding-left:16px;padding-right:16px;}.player-card{grid-template-columns:36px 1fr auto;gap:8px;padding:12px 14px;}}
  </style>
</head>
<body>
<div class="nav-wrap">
  <div class="nav-top">
    <a class="nav-logo" href="index.html">The Depth <span>Chart</span></a>
    <div class="nav-actions" id="navActions">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <a href="pricing.html" style="font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);text-decoration:none;">Sign In</a>
      <a href="pricing.html" class="nav-signin">Subscribe</a>
    </div>
  </div>
  <div class="nav-sub">
    <a href="index.html">Rankings</a>
    <a href="roster.html">Players</a>
    <a href="recent.html" class="active">Recent</a>
    <a href="compare-players.html">Compare</a>
    <a href="forum.html">Forum</a>
    <a href="community.html">Community</a>
    <a href="about.html">About</a>
    <a href="pricing.html">Pricing</a>
  </div>
</div>

<div class="layout">
  <div class="page-eyebrow">Transfer Portal</div>
  <h1 class="page-h1">Recent Additions</h1>
  <p class="page-sub">Updated daily. Players listed with their previous team → new destination.</p>

  <div class="filter-row">
    <select class="filter-select" id="posFilter" onchange="render()">
      <option value="">All Positions</option>
      <option value="PG">PG</option>
      <option value="SG">SG</option>
      <option value="CG">CG</option>
      <option value="SF">SF</option>
      <option value="PF">PF</option>
      <option value="C">C</option>
    </select>
    <select class="filter-select" id="gradeFilter" onchange="render()">
      <option value="">All Grades</option>
      <option value="A+">A+</option><option value="A">A</option><option value="A-">A-</option>
      <option value="B+">B+</option><option value="B">B</option><option value="B-">B-</option>
      <option value="C+">C+</option><option value="C">C</option><option value="C-">C-</option>
      <option value="D+">D+</option><option value="D">D</option>
    </select>
    <span class="count-badge" id="countEl"></span>
  </div>

  <div id="feed">
    <div class="loading-state"><div class="loading-spinner"></div>Loading...</div>
  </div>
</div>

<footer>
  <div class="footer-logo">The Depth <span>Chart</span></div>
  <div class="footer-meta">College Basketball Roster Analysis · 2025–26</div>
</footer>

<script>
const SB  = 'https://izlqhnxowdhtdofkwrho.supabase.co';
const KEY = 'sb_publishable_XQKr9A5ZP79pe0ac1RKYvA_-0dAx9Ye';
const H   = {'apikey':KEY,'Authorization':`Bearer ${KEY}`};

let allAdditions = [];

function gc(g){ return {'A+':'gAp','A':'gA','A-':'gAm','B+':'gBp','B':'gB','B-':'gBm','C+':'gCp','C':'gC','C-':'gCm','D+':'gDp','D':'gD','D-':'gDm','F':'gF'}[g]||''; }
function fmt(v){ return (v!==null&&v!==undefined&&v!=='')? Number(v).toFixed(1):'—'; }

async function load(){
  try {
    const r = await fetch(`${SB}/rest/v1/recent_additions?select=*&order=id.desc`, {headers:H});
    allAdditions = await r.json();
    render();
  } catch(e){
    document.getElementById('feed').innerHTML='<div class="empty-state">Could not load additions.</div>';
  }
}

function render(){
  const pos   = document.getElementById('posFilter').value;
  const grade = document.getElementById('gradeFilter').value;

  let filtered = allAdditions.filter(p => {
    if(pos   && p.position !== pos) return false;
    if(grade && p.tdc_grade !== grade) return false;
    return true;
  });

  document.getElementById('countEl').innerHTML = `<strong>${filtered.length}</strong> players`;

  if(!filtered.length){
    document.getElementById('feed').innerHTML='<div class="empty-state">No additions match your filters.</div>';
    return;
  }

  // Group by date — keep order as-is (newest date = highest id = top)
  const byDate = {};
  const dateOrder = [];
  filtered.forEach(p => {
    const d = p.added_date || 'Undated';
    if(!byDate[d]){ byDate[d]=[]; dateOrder.push(d); }
    byDate[d].push(p);
  });

  document.getElementById('feed').innerHTML = dateOrder.map(date => `
    <div class="date-section">
      <div class="date-header">
        <div class="date-label">${date}</div>
        <span class="date-count">${byDate[date].length} player${byDate[date].length!==1?'s':''}</span>
        <div class="date-line"></div>
      </div>
      ${byDate[date].map(p => {
        const hasStats = p.ppg || p.rpg || p.apg;
        const statsStr = hasStats
          ? `${fmt(p.ppg)} PPG · ${fmt(p.rpg)} RPG · ${fmt(p.apg)} APG`
          : 'No stats available';
        return `<div class="player-card">
          <div>
            <div class="player-pos">${p.position||'—'}</div>
            <div class="player-ht">${p.height||''}</div>
          </div>
          <div>
            <div class="player-name">${p.name}</div>
            <div class="player-move">
              <span class="move-from">${p.from_team||'—'}</span>
              <span class="move-arrow">➜</span>
              <span class="move-to">${p.to_team||'—'}</span>
            </div>
            <div class="player-yr">${p.class_year||''}</div>
          </div>
          <div class="player-right">
            <div class="player-grade ${gc(p.tdc_grade||'')}">${p.tdc_grade||'—'}</div>
            <div class="player-stats">${statsStr}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const next=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('tdc_theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙';
}
(function(){
  const saved=localStorage.getItem('tdc_theme')||'light';
  document.documentElement.setAttribute('data-theme',saved);
  window.addEventListener('DOMContentLoaded',()=>{
    const btn=document.getElementById('themeBtn');
    if(btn) btn.textContent=saved==='dark'?'☀️':'🌙';
  });
})();

load();
</script>
</body>
</html>
